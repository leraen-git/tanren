<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="512" height="512">
  <title>Tanren — Forge-Spark Mark</title>
  <desc>The Tanren logo mark. Outer ring = anvil. Inner red core = heated steel. Vertical bars = hammer axis. Horizontal bars = anvil top. Diagonal red lines = sparks of impact.</desc>

  <!-- Background (transparent — remove this rect for transparent background) -->
  <rect width="200" height="200" fill="#000000"/>

  <!-- Optional radial glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF2D3F" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#FF2D3F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="80" fill="url(#glow)"/>

  <!-- Outer ring (anvil) -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#FFFFFF" stroke-width="6"/>

  <!-- Inner core (heated steel) -->
  <circle cx="100" cy="100" r="14" fill="#FF2D3F"/>

  <!-- Vertical axis (hammer) -->
  <rect x="92" y="20" width="16" height="50" fill="#FFFFFF"/>
  <rect x="92" y="130" width="16" height="50" fill="#FFFFFF"/>

  <!-- Horizontal axis (anvil top) -->
  <rect x="20" y="92" width="50" height="16" fill="#FFFFFF"/>
  <rect x="130" y="92" width="50" height="16" fill="#FFFFFF"/>

  <!-- Diagonal sparks -->
  <line x1="148" y1="52" x2="135" y2="65" stroke="#FF2D3F" stroke-width="4" stroke-linecap="square"/>
  <line x1="52" y1="148" x2="65" y2="135" stroke="#FF2D3F" stroke-width="4" stroke-linecap="square"/>
</svg>
