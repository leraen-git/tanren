<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="512" height="512">
  <title>Tanren — Forge-Spark Mark (light variant)</title>
  <desc>Light-mode version of the Tanren logo. For use on white or light backgrounds.</desc>

  <!-- Outer ring (anvil) -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#000000" stroke-width="6"/>

  <!-- Inner core (heated steel) -->
  <circle cx="100" cy="100" r="14" fill="#E8192C"/>

  <!-- Vertical axis (hammer) -->
  <rect x="92" y="20" width="16" height="50" fill="#000000"/>
  <rect x="92" y="130" width="16" height="50" fill="#000000"/>

  <!-- Horizontal axis (anvil top) -->
  <rect x="20" y="92" width="50" height="16" fill="#000000"/>
  <rect x="130" y="92" width="50" height="16" fill="#000000"/>

  <!-- Diagonal sparks -->
  <line x1="148" y1="52" x2="135" y2="65" stroke="#E8192C" stroke-width="4" stroke-linecap="square"/>
  <line x1="52" y1="148" x2="65" y2="135" stroke="#E8192C" stroke-width="4" stroke-linecap="square"/>
</svg>
