<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>Tanren Icon — Layer 01 · Background Glow</title>
  <desc>Soft red radial glow behind the ring, simulates the heat from the forge. Intended to be placed as the bottom layer in Icon Composer with Blur 12px.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#FF2D3F" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#FF2D3F" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF2D3F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="512" cy="512" r="460" fill="url(#glow)"/>
</svg>
